spring:
  profiles:
    active: local

camel:
  main:
    run-controller: true

volk:
  sniffer:
    # Comma-separated list of directories to crawl. Override with the
    # VOLK_SNIFFER_DIRECTORIES environment variable.
    directories: ${VOLK_SNIFFER_DIRECTORIES:/tmp/volk-inbox}
    recursive: false

file-types:
  office-document: doc, docx, docm, xls, xlsm, xlsx, potm, ppt, pptx, pptm, csv
